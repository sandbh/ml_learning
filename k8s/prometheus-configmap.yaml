# Prometheus scrape config — cluster DNS to API Service (port 80 -> container 8000).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: heart-disease
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: heart-disease-api
        scrape_interval: 5s
        scrape_timeout: 4s
        metrics_path: /metrics
        static_configs:
          - targets:
              - heart-disease-api-service:80
