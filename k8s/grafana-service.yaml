# Grafana UI — port 3000 (admin / admin123 from Deployment env).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: heart-disease
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
