# Grafana datasource — Prometheus in same namespace (http://prometheus:9090).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: heart-disease
  labels:
    app: grafana
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
