# Apply full stack: kubectl apply -k k8s/
# Requires: namespace + API deployment/service already applied or included below.
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: heart-disease
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - prometheus-configmap.yaml
  - prometheus-deployment.yaml
  - prometheus-service.yaml
  - grafana-datasource-configmap.yaml
  - grafana-dashboard-provider-configmap.yaml
  - grafana-dashboard-json-configmap.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
