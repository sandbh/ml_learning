# Grafana dashboard file provider — loads JSON from /var/lib/grafana/dashboards.
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: heart-disease
  labels:
    app: grafana
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
