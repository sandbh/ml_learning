# .github/workflows/ci.yml — CI/CD for MLOps assignment (course S2-25_AMLCSZG523).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
#
# ── When does this run? ───────────────────────────────────────────────────────
#   • push / merge to branches: main, master only (other branches: open a PR)
#   • pull_request targeting main or master
#   • workflow_dispatch (Actions tab → CI/CD Pipeline → Run workflow)
#
# ── Four jobs (sequential) ───────────────────────────────────────────────────
#   1. lint — flake8
#   2. testing — pytest + upload test-results (pytest-results.xml)
#   3. training-model — preprocess → train.py → upload ml-training (models/ + mlruns/)
#   4. docker-build-smoke — needs training-model; docker build + /health + /predict smoke
#
#   Later jobs show "Queued" until the previous job finishes. That is normal.
#
# ── How long? (ballpark) ─────────────────────────────────────────────────────
#   Often ~15–35 minutes total. Slow parts: pip install (per job), GridSearchCV,
#   Docker build. training-model: 45m; lint/testing: 15m each.
#
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 src tests

  testing:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests (pytest)
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --junitxml=pytest-results.xml 2>&1 | tee pytest-output.log

      - name: Upload test results (pytest JUnit XML + console log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            pytest-results.xml
            pytest-output.log
          retention-days: 14
          if-no-files-found: warn

  # Train models + MLflow (runs only if testing passes).
  training-model:
    runs-on: ubuntu-latest
    needs: testing
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preprocess — create heart_disease_processed_dataset.csv
        run: python src/eda/eda.py preprocess

      - name: Train models + MLflow
        run: python src/model_training/train.py

      - name: Upload models & MLflow store (workflow artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ml-training
          path: |
            models/
            mlruns/
          retention-days: 14
          if-no-files-found: warn

  # Starts only after training-model succeeds; stays "Queued" until then.
  docker-build-smoke:
    runs-on: ubuntu-latest
    needs: training-model
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-training
          path: .

      - name: Verify model bundle
        run: |
          test -f models/best_model.pkl
          test -f models/feature_names.pkl

      - name: Build Docker image
        run: docker build -t heart-disease-api:ci .

      - name: Smoke test API container
        run: |
          docker run -d --name api-ci -p 8000:8000 heart-disease-api:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":2,"thalach":150,"exang":0,"oldpeak":2.3,"slope":2,"ca":0,"thal":1}'

          # Capture request log written by API_LOG_PATH inside the container.
          # The Dockerfile sets: API_LOG_PATH=/app/logs/api_requests.log
          mkdir -p ci-artifacts
          docker cp api-ci:/app/logs/api_requests.log ci-artifacts/api_requests.log || true
          docker logs api-ci > ci-artifacts/api_container_stdout.log 2>&1 || true

          docker rm -f api-ci

      - name: Upload API request logs (smoke test)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-logs
          path: ci-artifacts/
          retention-days: 14
          if-no-files-found: warn
