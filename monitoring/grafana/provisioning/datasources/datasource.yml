# Grafana datasource provisioning — Prometheus at http://prometheus:9090 (Compose network).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
---
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
