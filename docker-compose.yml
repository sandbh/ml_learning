# docker-compose.yml — local stack: FastAPI + Prometheus + Grafana (Tasks 6 & 8).
# Author: SANDIP BHATTACHARYYA — BITS Pilani ID 2025cs05025
#
# Prerequisites: train once so ./models contains best_model.pkl and feature_names.pkl.
# Usage (repo root), pick one:
#   docker compose up --build          # Compose V2 plugin (Docker Desktop)
#   docker-compose up --build          # standalone CLI (e.g. brew install docker-compose)
#
# URLs:
#   API          http://localhost:8000/docs
#   Prometheus   http://localhost:9090
#   Grafana      http://localhost:3000  (admin / admin123)
#
# Prometheus scrapes the API at heart-disease-api:8000/metrics (see monitoring/prometheus.yml).

services:
  heart-disease-api:
    build: .
    container_name: heart-disease-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    environment:
      MODEL_PATH: /app/models/best_model.pkl
      FEATURE_PATH: /app/models/feature_names.pkl
      API_LOG_PATH: /app/logs/api_requests.log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - heart-disease-api

  grafana:
    image: grafana/grafana:10.1.5
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Make the provisioned dashboard the default "Home" on login.
      # Path is inside the container (mounted below).
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/heart_disease_api.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/heart_disease_api.json:/var/lib/grafana/dashboards/heart_disease_api.json:ro
    depends_on:
      - prometheus

volumes:
  grafana_data:
